<?xml version="1.0" encoding="UTF-8"?>
<!--
  AirlockCompanion app icon.

  Metaphor: submarine / spacecraft airlock hatch.
    - Rounded-square background with the same green gradient the
      product site uses (#4bc492 → #2d8560).
    - White hatch door with a bold X-shaped wheel handle in dark
      green, evoking a bulkhead door / porthole.
    - Central hub in the darkest brand shade.

  Regenerate the .icns with `./make-icon.sh` if you edit this file.
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4bc492"/>
      <stop offset="1" stop-color="#2d8560"/>
    </linearGradient>
    <radialGradient id="door" cx="0.4" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e6f2ec"/>
    </radialGradient>
  </defs>

  <!-- Rounded-square base (macOS Big Sur ratio: ~22.5%) -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="url(#bg)"/>

  <!-- Hatch door fill -->
  <circle cx="512" cy="512" r="356" fill="url(#door)"/>

  <!-- Hatch frame -->
  <circle cx="512" cy="512" r="368" fill="none" stroke="#1e5a41" stroke-width="24"/>

  <!-- 4 bolts on the cardinal points, sitting on the frame -->
  <g fill="#1e5a41">
    <circle cx="512" cy="144" r="26"/>
    <circle cx="880" cy="512" r="26"/>
    <circle cx="512" cy="880" r="26"/>
    <circle cx="144" cy="512" r="26"/>
  </g>

  <!-- Wheel-handle X -->
  <g stroke="#2d8560" stroke-width="60" stroke-linecap="round">
    <line x1="332" y1="332" x2="692" y2="692"/>
    <line x1="692" y1="332" x2="332" y2="692"/>
  </g>

  <!-- Center hub -->
  <circle cx="512" cy="512" r="76" fill="#1e5a41"/>
  <circle cx="512" cy="512" r="28" fill="#4bc492"/>
</svg>
