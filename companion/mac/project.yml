# XcodeGen spec for the Airlock Companion Xcode project.
#
# XcodeGen is a small tool that reads this YAML and produces
# AirlockCompanion.xcodeproj on demand — the .xcodeproj itself is
# gitignored so we never fight noisy pbxproj diffs.
#
# Install:      brew install xcodegen
# Generate:     xcodegen
# Then open:    open AirlockCompanion.xcodeproj
#
# For CLI builds and CI we use `swift build` + build.sh — the Xcode
# project is purely for developers who want the Xcode UI (debugger,
# breakpoints, storyboard-y previews later).

name: AirlockCompanion

options:
  bundleIdPrefix: com.emdzej.airlock
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  groupSortPosition: top

targets:
  AirlockCompanion:
    type: application
    platform: macOS
    sources:
      - path: Sources/AirlockCompanion
        excludes:
          # main.swift for SwiftPM double-defines NSApp entry; the
          # Xcode target uses AppDelegate via @main-less setup below.
          - "main.swift"
      - path: assets/AppIcon.icns
        buildPhase: resources
    info:
      path: Info.plist
      properties:
        CFBundleName: Airlock
        CFBundleDisplayName: Airlock Companion
        CFBundleIdentifier: com.emdzej.airlock.companion
        CFBundleShortVersionString: "0.3.1"
        CFBundleVersion: "1"
        CFBundleIconFile: AppIcon
        LSMinimumSystemVersion: "13.0"
        LSUIElement: true
        NSBonjourServices:
          - "_airlock._tcp"
        NSLocalNetworkUsageDescription: "Airlock Companion discovers airlock devices on your local network via Bonjour and queries them for connected drives."
        NSPrincipalClass: NSApplication
    settings:
      base:
        MARKETING_VERSION: "0.3.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: NO
