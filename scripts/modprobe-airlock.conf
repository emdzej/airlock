# Airlock appliance USB hardening — OPT-IN.
#
# When copied to /etc/modprobe.d/, this file blocks non-storage USB
# interfaces from binding at attach time: HID (keyboards / mice) and
# CDC-* (USB Ethernet, serial, cellular) devices will be enumerated
# by the kernel but no driver will handle them. USB mass storage
# (usb-storage / uas) is unaffected, so Airlock keeps working.
#
# Trade-off: you can no longer plug a keyboard or USB-Ethernet adapter
# into the Pi. If you rely on either — leave this file uninstalled.
#
# Enable via the installer: AIRLOCK_HARDEN_USB=1 sudo -E ./install.sh
# Enable manually:          sudo cp modprobe-airlock.conf /etc/modprobe.d/
#                           sudo systemctl restart systemd-udevd
#                           # (or reboot)
#
# Remove by deleting /etc/modprobe.d/modprobe-airlock.conf and restarting
# systemd-udevd.

install usbhid /bin/true
install hid_generic /bin/true
install cdc_ncm /bin/true
install cdc_acm /bin/true
install cdc_ether /bin/true
install cdc_wdm /bin/true
install cdc_mbim /bin/true
install cdc_eem /bin/true
install cdc_subset /bin/true
