# Airlock — read-only root with a tmpfs overlay.
#
# All writes to / are captured in RAM and discarded on reboot. Persistent
# configuration (Wi-Fi credentials, hostname, etc.) lives on the FAT boot
# partition under /boot/airlock/ so it survives a power yank.
#
# Set overlayroot="" (empty) to boot with a writable root, e.g. for updates.
overlayroot="tmpfs"
overlayroot_cfgdisk="disabled"
