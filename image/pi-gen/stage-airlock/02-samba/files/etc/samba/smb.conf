[global]
    workgroup = WORKGROUP
    server string = Airlock
    server role = standalone server
    netbios name = airlock

    # No-auth: every unknown user is mapped to guest.
    map to guest = Bad User
    guest account = nobody
    security = user

    # Modern clients only.
    server min protocol = SMB2
    client min protocol = SMB2

    # Don't let Samba publish its own mDNS records — it ships a
    # competing _device-info._tcp record under the NetBIOS name with
    # model=MacSamba, which shadows the record our Avahi service
    # advertises.
    multicast dns register = no

    # No printing.
    load printers = no
    printing = bsd
    printcap name = /dev/null
    disable spoolss = yes

    # Logging.
    log level = 1
    max log size = 1000
    log file = /var/log/samba/log.%m

    # Dynamic share definitions written by airlockd on mount/unmount.
    include = /etc/samba/smb.conf.d/airlock.conf
