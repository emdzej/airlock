[global]
    workgroup = WORKGROUP
    server string = Airlock
    server role = standalone server
    netbios name = airlock

    # No-auth: every unknown user is mapped to guest.
    map to guest = Bad User
    guest account = nobody
    security = user

    # Modern clients only.
    server min protocol = SMB2
    client min protocol = SMB2

    # Don't let Samba publish its own mDNS records — it uses
    # model=MacSamba which Apple has no real icon for, and it overrides
    # the _device-info._tcp record our Avahi service ships.
    multicast dns register = no

    # macOS Finder decides the sidebar icon primarily from the AAPL
    # SMB2 create-context. That requires Samba's `fruit` VFS module to
    # be loaded, with `fruit:model` set. Without this, we advertise the
    # right model over mDNS but Finder falls back to a generic
    # computer icon because SMB negotiation doesn't confirm the model.
    vfs objects = fruit streams_xattr
    fruit:aapl = yes
    fruit:model = MacPro7,1
    fruit:metadata = stream
    fruit:posix_rename = yes

    # No printing.
    load printers = no
    printing = bsd
    printcap name = /dev/null
    disable spoolss = yes

    # Logging.
    log level = 1
    max log size = 1000
    log file = /var/log/samba/log.%m

    # Dynamic share definitions written by airlockd on mount/unmount.
    include = /etc/samba/smb.conf.d/airlock.conf
